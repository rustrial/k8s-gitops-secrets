name: publish

on:
    push:
        # Sequence of patterns matched against refs/tags
        tags:
            - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
    publish-oci-images:
        runs-on: ubuntu-latest
        env:
            DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Extract VERSION from GITHUB_REF
              run: TAG_NAME="${GITHUB_REF#refs/*/}"; echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
            - name: Set up QEMU
              id: qemu
              uses: docker/setup-qemu-action@v4
              with:
                  image: tonistiigi/binfmt:latest
                  platforms: all
            - name: Available platforms
              run: echo ${{ steps.qemu.outputs.platforms }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Build and push
              id: docker_build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      rustrial/k8s-gitops-secrets-controller:${{env.VERSION}}
    test-chart:
        name: install-chart
        runs-on: ubuntu-latest
        needs:
            - publish-oci-images
        strategy:
            matrix:
                k8s: # Must be available from https://github.com/kubernetes-sigs/kind/releases
                    - v1.33.7
                    - v1.34.3
                    - v1.35.0
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Extract VERSION from GITHUB_REF
              run: TAG_NAME="${GITHUB_REF#refs/*/}"; echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV
            - name: Set up Helm
              uses: azure/setup-helm@v5
              with:
                  version: "v4.1.3"
            - name: Run chart-testing (lint)
              run: (cd charts/k8s-gitops-secrets-controller && helm lint .)
            - name: Create kind ${{ matrix.k8s }} cluster
              uses: helm/kind-action@v1.14.0
              with:
                  version: "v0.31.0" # https://github.com/kubernetes-sigs/kind/releases
                  node_image: kindest/node:${{ matrix.k8s }}
                  cluster_name: kind
            - name: Dump kubeconfig
              run: kubectl config view
            - name: Install chart
              run: (cd charts/k8s-gitops-secrets-controller && helm install k8s-gitops-secrets-controller . -n k8s-gitops-secrets-system --create-namespace --wait --set fullnameOverride=k8s-gitops-secrets-controller-manager --set-string image.tag=${{env.VERSION}} --values ../../config/test-data/values.yaml)
            - name: Debug cluster state
              if: failure()
              run: |
                  kubectl get pods -A
                  kubectl get deployments -A
                  kubectl get events -A --sort-by='.lastTimestamp'
                  kubectl logs -n k8s-gitops-secrets-system deployment/k8s-gitops-secrets-controller-manager
                  kubectl logs -p -n k8s-gitops-secrets-system deployment/k8s-gitops-secrets-controller-manager
            - name: Tests
              run: ./.github/e2e-tests.sh
    create-release:
        name: Create Release
        needs:
            - publish-oci-images
            - test-chart
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: "✏️ Generate release changelog"
              id: generate-release-changelog
              uses: heinrichreimer/github-changelog-generator-action@v2.4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  #onlyLastTag: "true"
                  #stripHeaders: "true"
                  #stripGeneratorNotice: "true"
            - name: Restore Go cache
              uses: actions/cache@v5
              with:
                  path: ~/go/pkg/mod
                  key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: 1.26.1
            - name: Build seals CLI
              run: make cli
            - name: Extract TAG_NAME from GITHUB_REF
              run: echo "TAG_NAME=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
            - name: Rename release assets
              run: |
                  mv build/darwin/amd64/seals.gz build/darwin/amd64/seals-${{env.TAG_NAME}}-darwin-amd64.gz
                  mv build/darwin/arm64/seals.gz build/darwin/arm64/seals-${{env.TAG_NAME}}-darwin-arm64.gz
                  mv build/linux/amd64/seals.gz build/linux/amd64/seals-${{env.TAG_NAME}}-linux-amd64.gz
                  mv build/linux/arm64/seals.gz build/linux/arm64/seals-${{env.TAG_NAME}}-linux-arm64.gz
                  mv build/windows/amd64/seals.zip build/windows/amd64/seals-${{env.TAG_NAME}}-windows-amd64.zip
            - name: "🚀 Create GitHub release"
              uses: softprops/action-gh-release@v2
              with:
                  body: ${{ steps.generate-release-changelog.outputs.changelog }}
                  files: |
                      build/darwin/amd64/seals-${{env.TAG_NAME}}-darwin-amd64.gz
                      build/darwin/arm64/seals-${{env.TAG_NAME}}-darwin-arm64.gz
                      build/linux/amd64/seals-${{env.TAG_NAME}}-linux-amd64.gz
                      build/linux/arm64/seals-${{env.TAG_NAME}}-linux-arm64.gz
                      build/windows/amd64/seals-${{env.TAG_NAME}}-windows-amd64.zip
    publish-chart:
        needs:
            - publish-oci-images
            - test-chart
            - create-release
        runs-on: ubuntu-latest
        env:
            CR_OWNER: rustrial
            CR_GIT_REPO: k8s-gitops-secrets
            CR_PACKAGE_PATH: .cr-release-packages
            CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Configure Git
              run: |
                  git config user.name "$GITHUB_ACTOR"
                  git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
            - name: Install Helm
              uses: azure/setup-helm@v5
              with:
                  version: v4.1.3
            - name: Install CR
              run: .github/install-cr.sh
            - name: Update Helm Chart versions
              run: |
                  export GIT_TAG="${GITHUB_REF##*/}"
                  export VERSION="${GIT_TAG#v}"
                  sed -i "s/version: 0.0.0/version: ${VERSION}/" charts/k8s-gitops-secrets-controller/Chart.yaml;
                  sed -i "s/appVersion: 0.0.0/appVersion: ${VERSION}/" charts/k8s-gitops-secrets-controller/Chart.yaml;
            - name: Package Helm Charts
              run: /tmp/cr package charts/k8s-gitops-secrets-controller
            - name: Upload Helm Charts
              run: /tmp/cr upload -c $GITHUB_SHA
            - name: Update Helm Repository index
              run: /tmp/cr index -c https://rustrial.github.io/k8s-gitops-secrets --push
